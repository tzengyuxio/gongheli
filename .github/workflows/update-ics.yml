name: Update ICS subscription files

on:
  schedule:
    # Run at 00:30 UTC on January 1st every year
    - cron: '30 0 1 1 *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate ICS files (rolling 4-year window)
        run: |
          YEAR=$(date +%Y)
          PREV=$((YEAR - 1))
          END=$((YEAR + 2))
          echo "Generating ICS for ${PREV}-${END}"

          python tools/generate_ics.py --start "$PREV" --end "$END" --lang zh --no-bom -o web/public/ics/gonghe_zh.ics
          python tools/generate_ics.py --start "$PREV" --end "$END" --lang zh --ganzhi --no-bom -o web/public/ics/gonghe_zh_ganzhi.ics
          python tools/generate_ics.py --start "$PREV" --end "$END" --lang en --no-bom -o web/public/ics/gonghe_en.ics
          python tools/generate_ics.py --start "$PREV" --end "$END" --lang en --ganzhi --no-bom -o web/public/ics/gonghe_en_ganzhi.ics

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/public/ics/*.ics
          if git diff --cached --quiet; then
            echo "No changes to ICS files"
          else
            YEAR=$(date +%Y)
            git commit -m "chore(ics): update subscription files to $((YEAR - 1))-$((YEAR + 2))"
            git push
          fi
